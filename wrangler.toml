# Cloudflare Pages build configuration.
#
# Committing this file lets Cloudflare Pages read the build output location
# from the repo, so the dashboard only needs the build command + framework
# preset. `pages_build_output_dir` marks this as a Pages project (not Workers).
#
# This is a fully static site (no Pages Functions); `compatibility_date` is
# still required by wrangler and simply pins the Functions runtime baseline.
name = "skyboxeditor"
pages_build_output_dir = "dist"
compatibility_date = "2025-11-01"
